# aria2c configuration file
# Ref: https://aria2.github.io/manual/en/html/aria2c.html

# --- Performance & Speed ---
# Max concurrent downloads (Default: 5)
max-concurrent-downloads=10
# Max connections to one server for each download (Default: 1, Max: 16)
max-connection-per-server=16
# Number of connections to use per download (Default: 5, Max: 16)
split=16
# Only split if file is larger than 2*SIZE (Default: 20M)
min-split-size=1M
# Enable disk cache to reduce disk I/O (Default: 16M)
disk-cache=64M
# Enable memory mapped I/O (Linux only, Default: false)
enable-mmap=true
# Dynamically adjust concurrent downloads (Default: false)
optimize-concurrent-downloads=true
# Continue downloading partially downloaded files (Default: false)
continue=true
# Pre-allocate file size (reduces disk fragmentation)
file-allocation=falloc
# Max overall download/upload speed (0 = unrestricted)
max-overall-download-limit=0
max-overall-upload-limit=0

# --- Timeouts & Retries ---
# Timeout for network connections (Default: 60)
connect-timeout=60
# Timeout for entire download (Default: 60)
timeout=60
# Max number of retries (0 = unlimited)
max-tries=0
# Time to wait between retries (Default: 0)
retry-wait=10

# --- BitTorrent ---
# Enable IPv4 DHT functionality (Default: true)
enable-dht=true
# Enable IPv6 DHT functionality (Default: false)
enable-dht6=false
# Enable Peer Exchange (Default: true)
enable-peer-exchange=true
# Enable Local Peer Discovery (Default: false)
bt-enable-lpd=true
# Stop seeding immediately after download (User preference)
seed-time=0
# Max peers per torrent (Default: 55)
bt-max-peers=100
# Save download progress automatically (prevents data loss)
auto-save-interval=60

# --- RPC (Optional) ---
# Enable RPC for remote control (e.g., via AriaNg)
# enable-rpc=true
# rpc-allow-origin-all=true
# rpc-listen-all=false

# --- Logging & UI ---
# Summary interval in seconds (0 = disable)
summary-interval=0
# Console log level (Default: notice)
# console-log-level=warn

# --- User Agent ---
# Identify as a modern browser to avoid being blocked by some servers
user-agent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/93.0.4577.63 Safari/537.36
