# ==========================
# General Settings
# ==========================

# Change prefix from 'Ctrl+b' to 'Ctrl+a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window and pane numbering at 1 (0 is too far away)
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 50000

# Reduce escape time delay (fixes lag in Neovim)
set -sg escape-time 10

# Focus events enabled for terminals that support them
set -g focus-events on

# Upgrade $TERM (true color support)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ==========================
# Key Bindings
# ==========================

# Easy config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Easier window splitting (using current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# Vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle last window
bind Tab last-window

# Toggle pane synchronization
bind y set-window-option synchronize-panes

# Skip kill pane/window confirmation
bind x kill-pane
bind X kill-window

# Break pane into a new window (background)
bind ! break-pane -d
# Join pane from another window (pull into current)
bind @ join-pane -h

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# ==========================
# Copy Mode (Vim style)
# ==========================

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Headless box: no system clipboard. Stay inside the tmux paste buffer
# (use `prefix + ]` to paste). If the local terminal supports OSC 52,
# tmux's `set -g set-clipboard on` will additionally forward yanks home.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
set -g set-clipboard on

# ==========================
# Session & Popup Management
# ==========================

# Fuzzy find and switch sessions (requires fzf)
bind C-f display-popup -E "tmux list-sessions | fzf --reverse --header 'Switch Session' | cut -d: -f1 | xargs tmux switch-client -t"

# Floating popup scratchpad (M-p for generic shell)
bind -n M-p display-popup -d "#{pane_current_path}" -E "$SHELL"

# Create new session and prompt for name
bind S command-prompt -p "New Session Name:" "new-session -A -s '%%'"

# ==========================
# Status Bar & UI
# ==========================

# Auto-rename windows to current directory
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Status bar design
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left-length 40
set -g status-left "#[fg=#82aaff,bold] #S #[fg=#c0caf5]| "
set -g status-right "#[fg=#ffc777]%H:%M #[fg=#c3e88d]%d-%b-%y "

# Window status formatting
set -g window-status-format " #I:#W "
set -g window-status-current-style "fg=#16161e,bg=#82aaff,bold"
set -g window-status-current-format " #I:#W "

# Message styling
set -g message-style "fg=#ffc777,bg=#16161e,bold"

# Pane border styling
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#82aaff"
